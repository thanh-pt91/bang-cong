<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dr Huong">
<meta name="theme-color" content="#FBF6F3">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<title>Bảng Công</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #FBF6F3;
    --card: #FFFFFF;
    --line: #EFE4DE;
    --ink: #2E2521;
    --ink-soft: #8C7E78;
    --rose: #B3697A;
    --rose-deep: #9A4F60;
    --tiem: #5E85A0;
    --tiem-bg: #E8EFF3;
    --may: #C08247;
    --may-bg: #F7E9DA;
    --danger: #C25B4E;
    --shadow: 0 2px 14px rgba(46,37,33,0.06);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  button{touch-action:manipulation;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overscroll-behavior:none;
  }
  .display{font-family:'Fraunces', serif;}
  .tnum{font-variant-numeric: tabular-nums;}

  #app{
    max-width:480px; margin:0 auto;
    min-height:100vh;
    display:none; flex-direction:column;
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
  }
  body.authenticated #app{display:flex;}

  #auth-screen{
    min-height:100vh; padding:calc(28px + env(safe-area-inset-top)) 22px calc(28px + env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:center;
  }
  body.authenticated #auth-screen{display:none;}
  .auth-card{width:100%; max-width:420px; background:var(--card); border-radius:24px; padding:28px 22px; box-shadow:var(--shadow);}
  .auth-title{font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin-bottom:5px;}
  .auth-sub{font-size:13px; color:var(--ink-soft); margin-bottom:24px; line-height:1.5;}
  .auth-field{margin-bottom:13px;}
  .auth-field label{display:block; font-size:11px; color:var(--ink-soft); margin:0 2px 6px;}
  .auth-field input{width:100%; border:1.5px solid var(--line); border-radius:13px; padding:13px 14px; outline:none; font:500 15px 'Inter',sans-serif; color:var(--ink); background:#fff;}
  .auth-field input:focus{border-color:var(--rose);}
  .auth-submit{width:100%; border:none; border-radius:14px; padding:14px; margin-top:5px; background:var(--rose); color:#fff; font-size:15px; font-weight:700;}
  .auth-submit:disabled{opacity:.55;}
  #auth-error{min-height:18px; margin-top:12px; color:var(--danger); font-size:12px; text-align:center;}
  .account-tools{display:flex; align-items:center; gap:8px;}
  #sync-state{font-size:10.5px; color:var(--ink-soft); cursor:pointer; padding:5px 2px;}
  .logout-btn{border:1px solid var(--line); background:var(--card); color:var(--ink-soft); border-radius:10px; padding:6px 9px; font-size:11px; font-weight:600;}

  header.top{
    padding: calc(18px + env(safe-area-inset-top)) 20px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header.top .title{
    font-family:'Fraunces', serif;
    font-size:22px; font-weight:600; letter-spacing:0.2px;
  }
  header.top .sub{
    font-size:12px; color:var(--ink-soft);
  }

  main{flex:1; padding: 0 16px 24px;}

  /* ---- Date nav ---- */
  .datebar{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border-radius:16px;
    padding:10px 8px; margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .datebar button.nav{
    width:38px; height:38px; border-radius:10px; border:none;
    background:transparent; color:var(--rose-deep);
    font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .datebar button.nav:active{background:var(--tiem-bg);}
  .datebar .label{
    flex:1; text-align:center; font-size:15px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; gap:1px;
    position:relative;
  }
  .datebar .label .wd{font-size:11px; color:var(--ink-soft); font-weight:500;}
  .datebar input[type=date]{
    position:absolute; opacity:0; inset:0; width:100%; height:100%; border:none;
  }

  /* ---- Segmented control ---- */
  .segmented{
    display:flex; background:#F1E7E1; border-radius:12px; padding:3px;
    margin-bottom:16px;
  }
  .segmented button{
    flex:1; border:none; background:transparent; padding:9px 0;
    font-size:13px; font-weight:600; color:var(--ink-soft); border-radius:9px;
  }
  .segmented button.active{background:var(--card); color:var(--rose-deep); box-shadow:var(--shadow);}

  /* ---- Type toggle ---- */
  .typetoggle{display:flex; gap:10px; margin-bottom:14px;}
  .typetoggle button{
    flex:1; border-radius:16px; padding:14px 10px; border:1.5px solid var(--line);
    background:var(--card); text-align:left; position:relative;
  }
  .typetoggle button .dot{
    width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px;
  }
  .typetoggle button .name{font-size:14px; font-weight:600;}
  .typetoggle button .rate{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .typetoggle button.sel-tiem{border-color:var(--tiem); background:var(--tiem-bg);}
  .typetoggle button.sel-may{border-color:var(--may); background:var(--may-bg);}
  .typetoggle .dot.tiem{background:var(--tiem);}
  .typetoggle .dot.may{background:var(--may);}

  .customer-fields{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .customer-field{background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:9px 12px 8px;}
  .customer-field:focus-within{border-color:var(--rose);}
  .customer-field label{display:block; font-size:10.5px; color:var(--ink-soft); margin-bottom:3px;}
  .customer-field input{width:100%; border:none; outline:none; background:transparent; color:var(--ink); font:600 13.5px 'Inter',sans-serif; padding:0;}
  .customer-field input::placeholder{color:#CBBEB8; font-weight:500;}

  /* ---- Amount entry card ---- */
  .entrycard{
    background:var(--card); border-radius:20px; padding:18px 18px 8px;
    box-shadow:var(--shadow); margin-bottom:16px;
  }
  .amount-display{
    text-align:right; padding: 6px 4px 14px;
  }
  .amount-display .val{
    font-family:'Fraunces', serif; font-size:34px; font-weight:600;
    color:var(--ink);
  }
  .amount-display .val.placeholder{color:#CBBEB8;}
  .amount-display .commission{
    font-size:12.5px; color:var(--rose-deep); font-weight:600; margin-top:2px;
  }
  .numpad{
    display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom:12px;
  }
  .numpad button{
    border:none; background:#F7F1ED; border-radius:12px;
    font-size:19px; font-weight:600; padding:14px 0; color:var(--ink);
  }
  .numpad button:active{background:#EEE1DA;}
  .numpad button{touch-action:manipulation; user-select:none; -webkit-user-select:none;}
  .numpad button.zero3{font-size:15px;}
  .numpad button.back{color:var(--danger); font-size:16px;}
  .addbtn{
    width:100%; border:none; border-radius:14px; padding:14px 0; margin-bottom:14px;
    background:var(--rose); color:#fff; font-size:15px; font-weight:700;
  }
  .addbtn:disabled{background:#E3D3CE; color:#fff;}
  .addbtn:active:not(:disabled){background:var(--rose-deep);}
  .entry-actions{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:20px; margin-bottom:14px;}
  .entry-actions button{border:none; border-radius:14px; padding:13px 8px; font-size:13.5px; font-weight:700;}
  .entry-actions button:disabled{opacity:.48;}
  .queue-btn{background:#F1E7E1; color:var(--rose-deep);}
  .save-now-btn{background:var(--rose); color:#fff;}

  .visit-cart{background:var(--card); border-radius:18px; padding:15px; margin:-2px 0 16px; box-shadow:var(--shadow);}
  .visit-cart-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .visit-cart-title{font-size:13px; font-weight:700;}
  .visit-cart-count{font-size:10.5px; color:var(--rose-deep); background:#F3E7E3; border-radius:20px; padding:3px 8px;}
  .visit-item{display:flex; align-items:center; gap:9px; padding:9px 0; border-bottom:1px solid var(--line);}
  .visit-item:last-of-type{border-bottom:none;}
  .visit-item .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .visit-item .dot.tiem{background:var(--tiem);}
  .visit-item .dot.may{background:var(--may);}
  .visit-item-info{flex:1;}
  .visit-item-name{font-size:12.5px; font-weight:600;}
  .visit-item-commission{font-size:10.5px; color:var(--ink-soft); margin-top:1px;}
  .visit-item-amount{font-family:'Fraunces',serif; font-size:14px; font-weight:600;}
  .visit-item-remove{width:26px; height:26px; border:none; border-radius:50%; background:#F3E7E3; color:var(--danger);}
  .visit-total{display:flex; justify-content:space-between; gap:12px; background:#F7F1ED; border-radius:13px; padding:11px 12px; margin:11px 0;}
  .visit-total-cell{flex:1;}
  .visit-total-label{font-size:10px; color:var(--ink-soft); margin-bottom:2px;}
  .visit-total-value{font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
  .visit-total-cell:last-child .visit-total-value{color:var(--rose-deep);}
  .save-visit-btn{width:100%; border:none; border-radius:13px; padding:13px; background:var(--rose); color:#fff; font-size:14px; font-weight:700;}

  .visit-entry{background:var(--card); border-radius:16px; padding:14px; margin-bottom:10px; box-shadow:var(--shadow);}
  .visit-entry-head{display:flex; align-items:flex-start; gap:10px; padding-bottom:10px; border-bottom:1px solid var(--line);}
  .visit-entry-customer{flex:1;}
  .visit-entry-name{font-size:13.5px; font-weight:700;}
  .visit-entry-code{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .visit-entry-total{text-align:right;}
  .visit-entry-total .amount{font-family:'Fraunces',serif; font-size:15px; font-weight:600;}
  .visit-entry-total .commission{font-size:10.5px; color:var(--rose-deep); margin-top:2px;}
  .visit-entry-delete{width:28px; height:28px; flex-shrink:0; border:none; border-radius:50%; background:#F3E7E3; color:var(--danger);}
  .visit-service-row{display:flex; align-items:center; gap:8px; margin-left:18px; padding:9px 0 0 11px; border-left:2px solid var(--line);}
  .visit-service-row .dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .visit-service-row .dot.tiem{background:var(--tiem);}
  .visit-service-row .dot.may{background:var(--may);}
  .visit-service-info{flex:1;}
  .visit-service-name{font-size:11.5px; font-weight:600; color:var(--ink-soft);}
  .visit-service-com{font-size:9.5px; color:var(--ink-soft); margin-top:1px;}
  .visit-service-amount{font-family:'Fraunces',serif; font-size:12.5px; font-weight:600;}
  .visit-service-row .edit{width:25px; height:25px; font-size:11px;}

  /* ---- Summary strip ---- */
  .summary{
    display:flex; gap:10px; margin-bottom:16px;
  }
  .summary .box{
    flex:1; background:var(--card); border-radius:16px; padding:14px;
    box-shadow:var(--shadow);
  }
  .summary .box .k{font-size:11px; color:var(--ink-soft); margin-bottom:4px;}
  .summary .box .v{font-family:'Fraunces', serif; font-size:19px; font-weight:600;}
  .summary .box.hi .v{color:var(--rose-deep);}

  /* ---- List ---- */
  .listtitle{font-size:12.5px; font-weight:700; color:var(--ink-soft); margin: 6px 2px 8px; text-transform:uppercase; letter-spacing:0.4px;}
  .entry-row{
    background:var(--card); border-radius:14px; padding:12px 14px;
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
    box-shadow:var(--shadow);
  }
  .entry-row .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .entry-row .dot.tiem{background:var(--tiem);}
  .entry-row .dot.may{background:var(--may);}
  .entry-row .info{flex:1;}
  .entry-row .info .t{font-size:13.5px; font-weight:600;}
  .entry-row .info .c{font-size:11.5px; color:var(--rose-deep);}
  .entry-row .info .customer{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
  .entry-row .amt{font-family:'Fraunces', serif; font-size:15px; font-weight:600;}
  .entry-row .edit{width:28px; height:28px; border-radius:50%; border:none; background:var(--tiem-bg); color:var(--tiem); font-size:13px; display:flex; align-items:center; justify-content:center; margin-left:2px;}
  .entry-row .del{
    width:26px; height:26px; border-radius:50%; border:none; background:#F3E7E3;
    color:var(--danger); font-size:13px; display:flex; align-items:center; justify-content:center;
    margin-left:2px;
  }
  .empty{
    text-align:center; padding:40px 10px; color:var(--ink-soft); font-size:13.5px;
  }
  .empty .ic{font-size:26px; margin-bottom:8px;}

  /* ---- Stats period nav ---- */
  .periodbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; padding: 0 2px;
  }
  .periodbar button{
    width:34px; height:34px; border-radius:10px; border:none; background:var(--card);
    box-shadow:var(--shadow); color:var(--rose-deep); font-size:16px;
  }
  .periodbar .plabel{font-size:14px; font-weight:700; text-align:center; position:relative; min-width:190px; padding:5px 10px; border-radius:12px;}
  .periodbar .plabel:active{background:#F1E7E1;}
  .periodbar .plabel .sm{display:block; font-size:11px; font-weight:500; color:var(--ink-soft); margin-top:1px;}
  .periodbar .plabel input[type=date]{position:absolute; opacity:0; inset:0; width:100%; height:100%; border:none; cursor:pointer;}

  /* ---- Donut ---- */
  .donutwrap{
    background:var(--card); border-radius:20px; padding:22px; margin-bottom:16px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:20px;
  }
  .donutwrap svg{flex-shrink:0;}
  .donut-center-label{font-size:10.5px; color:var(--ink-soft); text-align:center;}
  .donut-center-val{font-family:'Fraunces', serif; font-size:16px; font-weight:600; text-align:center;}
  .legend{flex:1;}
  .legend .row{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .legend .row:last-child{margin-bottom:0;}
  .legend .sw{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
  .legend .sw.tiem{background:var(--tiem);}
  .legend .sw.may{background:var(--may);}
  .legend .txt .n{font-size:12.5px; font-weight:600;}
  .legend .txt .v{font-size:12px; color:var(--ink-soft);}

  .breakdown{margin-bottom:8px;}
  .bd-row{
    background:var(--card); border-radius:16px; padding:14px 16px; margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .bd-row.clickable{cursor:pointer; position:relative; padding-right:38px;}
  .bd-row.clickable:active{transform:scale(.99); background:#FFFDFC;}
  .bd-row .chevron{position:absolute; right:15px; top:50%; transform:translateY(-50%); color:var(--rose-deep); font-size:18px;}
  .bd-row .hd{display:flex; align-items:center; justify-content:between; gap:8px; margin-bottom:8px;}
  .bd-row .hd .name{font-size:13.5px; font-weight:700; flex:1;}
  .bd-row .hd .rate{font-size:11px; color:var(--ink-soft); background:#F3ECE7; padding:2px 8px; border-radius:20px;}
  .bd-row .stats{display:flex; justify-content:space-between;}
  .bd-row .stats .c{}
  .bd-row .stats .c .k{font-size:10.5px; color:var(--ink-soft);}
  .bd-row .stats .c .v{font-family:'Fraunces', serif; font-size:15px; font-weight:600;}

  .detail-top{display:flex; align-items:center; gap:11px; margin-bottom:15px;}
  .detail-back{width:38px; height:38px; border:none; border-radius:12px; background:var(--card); color:var(--rose-deep); box-shadow:var(--shadow); font-size:20px;}
  .detail-heading{flex:1;}
  .detail-title{font-family:'Fraunces',serif; font-size:20px; font-weight:600;}
  .detail-period{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .detail-day-title{font-size:11.5px; font-weight:700; color:var(--ink-soft); margin:15px 2px 7px; text-transform:uppercase; letter-spacing:.35px;}
  .detail-entry{background:var(--card); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-bottom:8px; box-shadow:var(--shadow);}
  .detail-entry .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .detail-entry .dot.tiem{background:var(--tiem);}
  .detail-entry .dot.may{background:var(--may);}
  .detail-entry-info{flex:1; min-width:0;}
  .detail-entry-name{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .detail-entry-code{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}
  .detail-entry-money{text-align:right; flex-shrink:0;}
  .detail-entry-amount{font-family:'Fraunces',serif; font-size:14px; font-weight:600;}
  .detail-entry-com{font-size:10.5px; color:var(--rose-deep); margin-top:2px;}

  /* ---- App modals ---- */
  .modal-backdrop{
    position:fixed; inset:0; z-index:80; padding:20px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(46,37,33,.34); backdrop-filter:blur(5px);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .2s ease, visibility 0s linear .2s;
  }
  .modal-backdrop.show{opacity:1; visibility:visible; pointer-events:auto; transition:opacity .2s ease;}
  .app-modal{
    width:100%; max-width:410px; background:var(--bg); border:1px solid var(--line);
    border-radius:24px; padding:22px; box-shadow:0 18px 60px rgba(46,37,33,.22);
    transform:translateY(12px) scale(.98); transition:transform .2s ease;
  }
  .modal-backdrop.show .app-modal{transform:translateY(0) scale(1);}
  .modal-icon{width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:13px; background:#F3E7E3; color:var(--rose-deep); font-size:19px;}
  .modal-title{font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin-bottom:5px;}
  .modal-sub{font-size:12.5px; line-height:1.45; color:var(--ink-soft); margin-bottom:17px;}
  .modal-field{margin-bottom:12px;}
  .modal-field label{display:block; font-size:11px; color:var(--ink-soft); margin:0 2px 6px;}
  .modal-field input{width:100%; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:13px; padding:12px 13px; outline:none; font:600 15px 'Inter',sans-serif;}
  .modal-field input:focus{border-color:var(--rose); box-shadow:0 0 0 3px rgba(179,105,122,.10);}
  .modal-error{min-height:16px; color:var(--danger); font-size:11.5px; margin-top:-4px;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{flex:1; border:none; border-radius:13px; padding:12px; font-size:14px; font-weight:700;}
  .modal-cancel{background:#F1E7E1; color:var(--ink-soft);}
  .modal-primary{background:var(--rose); color:#fff;}
  .modal-danger{background:var(--danger); color:#fff;}
  .delete-amount{font-family:'Fraunces',serif; font-size:24px; color:var(--rose-deep); font-weight:600; margin:8px 0 3px;}
  .delete-customer{font-size:13px; color:var(--ink-soft);}

  /* ---- Toast ---- */
  #toast{
    position:fixed; left:16px; right:16px; bottom: calc(84px + env(safe-area-inset-bottom));
    max-width:448px; margin:0 auto;
    background:#2E2521; color:#fff; border-radius:14px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    font-size:13px; transform:translateY(16px); opacity:0; visibility:hidden;
    pointer-events:none; transition:transform .25s ease, opacity .2s ease, visibility 0s linear .25s;
    z-index:50;
  }
  #toast.show{
    transform:translateY(0); opacity:1; visibility:visible; pointer-events:auto;
    transition:transform .25s ease, opacity .2s ease;
  }
  #toast button{background:none; border:none; color:var(--rose); font-weight:700; font-size:13px;}

  /* ---- Tab bar ---- */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0;
    padding-bottom: env(safe-area-inset-bottom);
    background:rgba(251,246,243,0.92); backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:none; justify-content:center;
    z-index:40;
  }
  body.authenticated nav.tabbar{display:flex;}
  nav.tabbar .inner{
    max-width:480px; width:100%; display:flex;
  }
  nav.tabbar button{
    flex:1; border:none; background:transparent; padding:10px 0 8px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--ink-soft); font-size:10.5px; font-weight:600;
  }
  nav.tabbar button.active{color:var(--rose-deep);}
  nav.tabbar svg{width:22px; height:22px;}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= Config ================= */
const RATES = { tiem: 0.06, may: 0.08 };
const LABELS = { tiem: 'Dịch vụ tiêm', may: 'Dịch vụ bắn máy' };
const STORE_KEY = 'entries-store';
const SUPABASE_URL = 'https://mcmpxhqbjixnxbwuxpjv.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_tZzdGmF987bN4lr-U8yicA_QL0q9Oyh';
const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}
});

/* ================= State ================= */
let store = {};          // { "YYYY-MM-DD": [ {id, type, amount, ts} ] }
let storeLoaded = false;
let tab = 'entry';
let entryDate = new Date();
let statsMode = 'day';
let statsAnchor = new Date();
let statsDetailType = null;
let pendingType = 'tiem';
let pendingDigits = '';
let pendingCustomerName = '';
let pendingCustomerCode = '';
let pendingServices = [];
let lastDeleted = null;
let toastTimer = null;
let currentUser = null;
let appStarted = false;
let editContext = null;
let deleteContext = null;
let detailSwipeStart = null;

/* ================= Storage helpers ================= */
function activeStoreKey(){ return currentUser ? STORE_KEY+':'+currentUser.id : STORE_KEY; }
async function loadStore(){
  try{
    const scoped = localStorage.getItem(activeStoreKey());
    const legacy = localStorage.getItem(STORE_KEY);
    store = JSON.parse(scoped || legacy || '{}');
  }catch(e){
    store = {};
  }
  storeLoaded = true;
}
async function saveStore(){
  try{ localStorage.setItem(activeStoreKey(), JSON.stringify(store)); }
  catch(e){ console.error('Lưu thất bại', e); }
}

/* ================= Supabase sync ================= */
function setSyncState(text){
  const el = document.getElementById('sync-state');
  if(el) el.textContent = text;
}

function remoteRow(entry, dateKey){
  return {
    id: entry.id,
    work_date: dateKey,
    service_type: entry.type,
    customer_name: entry.customerName || null,
    customer_code: entry.customerCode || null,
    amount: Number(entry.amount),
    commission_rate: RATES[entry.type],
    created_at: new Date(entry.ts || Date.now()).toISOString()
  };
}

async function syncEntry(entry, dateKey){
  entry.updatedAt=Date.now();
  const queueKey=activeStoreKey()+':deletes';
  const pending=JSON.parse(localStorage.getItem(queueKey)||'[]');
  localStorage.setItem(queueKey,JSON.stringify(pending.filter(id=>id!==entry.id)));
  if(!currentUser || !navigator.onLine) return setSyncState('Lưu trên máy');
  setSyncState('Đang đồng bộ…');
  const {error} = await dbClient.from('entries').upsert(remoteRow(entry,dateKey), {onConflict:'id'});
  if(error){ console.error(error); setSyncState('Chưa đồng bộ'); return false; }
  setSyncState('Đã đồng bộ');
  return true;
}

async function removeRemoteEntry(id){
  const queueKey=activeStoreKey()+':deletes';
  const pending=JSON.parse(localStorage.getItem(queueKey)||'[]');
  if(!pending.includes(id)) pending.push(id);
  localStorage.setItem(queueKey,JSON.stringify(pending));
  if(!currentUser || !navigator.onLine) return setSyncState('Lưu trên máy');
  setSyncState('Đang đồng bộ…');
  const {error} = await dbClient.from('entries').delete().eq('id', id);
  if(error){ console.error(error); setSyncState('Chưa đồng bộ'); return false; }
  localStorage.setItem(queueKey,JSON.stringify(pending.filter(item=>item!==id)));
  setSyncState('Đã đồng bộ');
  return true;
}

async function syncAllLegacy(){
  if(!currentUser || !navigator.onLine) return setSyncState('Đang ngoại tuyến');
  setSyncState('Đang đồng bộ…');
  const queueKey=activeStoreKey()+':deletes';
  const pendingDeletes=JSON.parse(localStorage.getItem(queueKey)||'[]');
  if(pendingDeletes.length){
    const {error:deleteError}=await dbClient.from('entries').delete().in('id',pendingDeletes);
    if(deleteError){ console.error(deleteError); setSyncState('Lỗi đồng bộ'); return; }
    localStorage.setItem(queueKey,'[]');
  }
  const localRows=[];
  Object.keys(store).forEach(dateKey=>(store[dateKey]||[]).forEach(entry=>localRows.push(remoteRow(entry,dateKey))));
  if(localRows.length){
    const {error:upsertError}=await dbClient.from('entries').upsert(localRows,{onConflict:'id'});
    if(upsertError){ console.error(upsertError); setSyncState('Lỗi đồng bộ'); return; }
  }
  const {data,error}=await dbClient.from('entries').select('id,work_date,service_type,customer_name,customer_code,amount,created_at').order('created_at',{ascending:true});
  if(error){ console.error(error); setSyncState('Lỗi đồng bộ'); return; }
  const remoteStore={};
  (data||[]).forEach(row=>{
    if(!remoteStore[row.work_date]) remoteStore[row.work_date]=[];
    remoteStore[row.work_date].push({
      id:row.id, visitId:visitKeyOf({id:row.id}), type:row.service_type, amount:Number(row.amount),
      customerName:row.customer_name||'', customerCode:row.customer_code||'',
      ts:new Date(row.created_at).getTime()
    });
  });
  store=remoteStore;
  await saveStore();
  localStorage.removeItem(STORE_KEY);
  render();
  setSyncState('Đã đồng bộ');
}

async function syncAll(){
  if(!currentUser || !navigator.onLine) return setSyncState('Đang ngoại tuyến');
  setSyncState('Đang đồng bộ…');
  const queueKey=activeStoreKey()+':deletes';
  const pendingDeletes=JSON.parse(localStorage.getItem(queueKey)||'[]');
  if(pendingDeletes.length){
    const {error:deleteError}=await dbClient.from('entries').delete().in('id',pendingDeletes);
    if(deleteError){ console.error(deleteError); setSyncState('Lỗi đồng bộ'); return; }
    localStorage.setItem(queueKey,'[]');
  }

  const columns='id,work_date,service_type,customer_name,customer_code,amount,created_at,updated_at';
  const {data:remoteBefore,error:readError}=await dbClient.from('entries').select(columns);
  if(readError){ console.error(readError); setSyncState('Lỗi đồng bộ'); return; }
  const remoteById={};
  (remoteBefore||[]).forEach(row=>remoteById[row.id]=row);
  const uploads=[];
  Object.keys(store).forEach(dateKey=>(store[dateKey]||[]).forEach(entry=>{
    const remote=remoteById[entry.id];
    const localTime=Number(entry.updatedAt||entry.ts||0);
    const remoteTime=remote ? new Date(remote.updated_at||remote.created_at).getTime() : 0;
    if(!remote || localTime>remoteTime+1000) uploads.push(remoteRow(entry,dateKey));
  }));
  if(uploads.length){
    const {error:uploadError}=await dbClient.from('entries').upsert(uploads,{onConflict:'id'});
    if(uploadError){ console.error(uploadError); setSyncState('Lỗi đồng bộ'); return; }
  }

  const {data,error}=await dbClient.from('entries').select(columns).order('created_at',{ascending:true});
  if(error){ console.error(error); setSyncState('Lỗi đồng bộ'); return; }
  const remoteStore={};
  (data||[]).forEach(row=>{
    if(!remoteStore[row.work_date]) remoteStore[row.work_date]=[];
    remoteStore[row.work_date].push({
      id:row.id, visitId:visitKeyOf({id:row.id}), type:row.service_type, amount:Number(row.amount),
      customerName:row.customer_name||'', customerCode:row.customer_code||'',
      ts:new Date(row.created_at).getTime(), updatedAt:new Date(row.updated_at||row.created_at).getTime()
    });
  });
  store=remoteStore;
  await saveStore();
  localStorage.removeItem(STORE_KEY);
  render();
  setSyncState('Đã đồng bộ');
}

async function startApp(user){
  currentUser=user;
  document.body.classList.add('authenticated');
  await loadStore();
  if(!appStarted){ render(); appStarted=true; }
  await syncAll();
}

async function login(event){
  event.preventDefault();
  const button=document.getElementById('login-btn');
  const errorBox=document.getElementById('auth-error');
  button.disabled=true; button.textContent='Đang đăng nhập…'; errorBox.textContent='';
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const {data,error}=await dbClient.auth.signInWithPassword({email,password});
  button.disabled=false; button.textContent='Đăng nhập';
  if(error){ errorBox.textContent='Email hoặc mật khẩu chưa đúng.'; return; }
  await startApp(data.user);
}

async function logout(){
  await dbClient.auth.signOut();
  currentUser=null; store={}; appStarted=false;
  document.body.classList.remove('authenticated');
}

window.addEventListener('online',()=>syncAll());
window.addEventListener('offline',()=>setSyncState('Đang ngoại tuyến'));
document.addEventListener('touchstart',event=>{
  if(!statsDetailType || event.touches.length!==1) return;
  const touch=event.touches[0];
  if(touch.clientX>55) return;
  detailSwipeStart={x:touch.clientX,y:touch.clientY,time:Date.now()};
},{passive:true});
document.addEventListener('touchend',event=>{
  if(!detailSwipeStart || !statsDetailType || !event.changedTouches.length){ detailSwipeStart=null; return; }
  const touch=event.changedTouches[0];
  const dx=touch.clientX-detailSwipeStart.x;
  const dy=Math.abs(touch.clientY-detailSwipeStart.y);
  const duration=Date.now()-detailSwipeStart.time;
  detailSwipeStart=null;
  if(dx>=80 && dy<=60 && duration<=700) closeStatsDetail();
},{passive:true});
document.addEventListener('touchcancel',()=>{ detailSwipeStart=null; },{passive:true});

/* ================= Date helpers ================= */
function pad(n){ return n<10 ? '0'+n : ''+n; }
function keyOf(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function sameDay(a,b){ return keyOf(a)===keyOf(b); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }
const WD = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
function fmtDate(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }

function weekRange(d){
  // Monday - Sunday
  const day = d.getDay(); // 0 sun..6 sat
  const diffToMon = day===0 ? -6 : 1-day;
  const start = addDays(d, diffToMon);
  const end = addDays(start, 6);
  return {start, end};
}
function monthRange(d){
  const start = new Date(d.getFullYear(), d.getMonth(), 1);
  const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return {start, end};
}
function datesBetween(start,end){
  const out=[]; let cur=new Date(start);
  while(cur<=end){ out.push(new Date(cur)); cur=addDays(cur,1); }
  return out;
}

/* ================= Money helpers ================= */
function fmtVND(n){
  return Math.round(n).toLocaleString('vi-VN') + ' đ';
}

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
  })[ch]);
}

/* ================= Aggregation ================= */
function entriesForDate(d){
  return store[keyOf(d)] || [];
}
function aggregate(dates){
  const agg = {
    revenue:0, commission:0, count:0,
    tiem:{revenue:0, commission:0, count:0},
    may:{revenue:0, commission:0, count:0}
  };
  dates.forEach(d=>{
    (store[keyOf(d)]||[]).forEach(e=>{
      const c = e.amount * RATES[e.type];
      agg.revenue += e.amount;
      agg.commission += c;
      agg.count += 1;
      agg[e.type].revenue += e.amount;
      agg[e.type].commission += c;
      agg[e.type].count += 1;
    });
  });
  return agg;
}

/* ================= Rendering ================= */
function setTab(t){
  tab = t;
  if(t!=='stats') statsDetailType=null;
  document.getElementById('tab-entry').classList.toggle('active', t==='entry');
  document.getElementById('tab-stats').classList.toggle('active', t==='stats');
  render();
}

function render(){
  const main = document.getElementById('main');
  main.innerHTML = tab==='entry' ? renderEntryTab() : (statsDetailType ? renderStatsDetail() : renderStatsTab());
  attachEntryTabEvents();
}

function renderDateBar(){
  const isToday = sameDay(entryDate, new Date());
  return `
  <div class="datebar">
    <button class="nav" onclick="shiftEntryDate(-1)">‹</button>
    <div class="label">
      <span>${isToday ? 'Hôm nay' : fmtDate(entryDate)}</span>
      <span class="wd">${WD[entryDate.getDay()]}${isToday ? ' · '+fmtDate(entryDate) : ''}</span>
      <input type="date" value="${keyOf(entryDate)}" onchange="jumpEntryDate(this.value)">
    </div>
    <button class="nav" onclick="shiftEntryDate(1)">›</button>
  </div>`;
}

function visitKeyOf(entry){
  if(entry.visitId) return entry.visitId;
  const match=String(entry.id||'').match(/^(v\d+_[a-z0-9]+)_\d+$/);
  return match ? match[1] : entry.id;
}
function groupVisits(entries){
  const groups=[];
  const byId={};
  entries.forEach(entry=>{
    const visitId=visitKeyOf(entry);
    if(!byId[visitId]){
      byId[visitId]={visitId,entries:[],ts:entry.ts};
      groups.push(byId[visitId]);
    }
    byId[visitId].entries.push(entry);
    byId[visitId].ts=Math.max(byId[visitId].ts||0,entry.ts||0);
  });
  return groups.sort((a,b)=>b.ts-a.ts);
}

function renderEntryTab(){
  const list = entriesForDate(entryDate).slice().sort((a,b)=>b.ts-a.ts);
  const visits = groupVisits(list);
  const agg = aggregate([entryDate]);
  const preview = pendingDigits ? parseInt(pendingDigits,10) : 0;
  const previewC = preview * RATES[pendingType];
  const visitRevenue = pendingServices.reduce((sum,item)=>sum+item.amount,0);
  const visitCommission = pendingServices.reduce((sum,item)=>sum+item.amount*RATES[item.type],0);

  return `
    ${renderDateBar()}

    <div class="typetoggle">
      <button class="${pendingType==='tiem'?'sel-tiem':''}" onclick="selectType('tiem')">
        <div><span class="dot tiem"></span><span class="name">Tiêm</span></div>
        <div class="rate">Hoa hồng 6%</div>
      </button>
      <button class="${pendingType==='may'?'sel-may':''}" onclick="selectType('may')">
        <div><span class="dot may"></span><span class="name">Bắn máy</span></div>
        <div class="rate">Hoa hồng 8%</div>
      </button>
    </div>

    <div class="customer-fields">
      <div class="customer-field">
        <label for="customer-name">Tên KH (không bắt buộc)</label>
        <input id="customer-name" type="text" maxlength="80" autocomplete="off"
          placeholder="Nhập tên" value="${escapeHtml(pendingCustomerName)}"
          oninput="pendingCustomerName=this.value">
      </div>
      <div class="customer-field">
        <label for="customer-code">MSKH (không bắt buộc)</label>
        <input id="customer-code" type="text" maxlength="40" autocomplete="off" autocapitalize="characters"
          placeholder="Nhập MSKH" value="${escapeHtml(pendingCustomerCode)}"
          oninput="pendingCustomerCode=this.value">
      </div>
    </div>

    <div class="entrycard">
      <div class="amount-display">
        <div class="val ${pendingDigits?'':'placeholder'} tnum">${pendingDigits ? fmtVND(preview) : '0 đ'}</div>
        <div class="commission tnum">${pendingDigits ? 'Hoa hồng dự kiến: '+fmtVND(previewC) : '&nbsp;'}</div>
      </div>
      <div class="numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="numTap('${n}')">${n}</button>`).join('')}
        <button class="zero3" onclick="numTap('000')">000</button>
        <button onclick="numTap('0')">0</button>
        <button class="back" onclick="numBack()">⌫</button>
      </div>
      <div class="entry-actions">
        <button class="queue-btn" ${preview<=0?'disabled':''} onclick="addPendingService()">+ Thêm dịch vụ</button>
        <button class="save-now-btn" ${(preview<=0 && pendingServices.length===0)?'disabled':''} onclick="saveVisit()">Lưu</button>
      </div>
    </div>

    ${pendingServices.length ? `
      <div class="visit-cart">
        <div class="visit-cart-head"><div class="visit-cart-title">Dịch vụ trong lượt khách</div><div class="visit-cart-count">${pendingServices.length} dịch vụ</div></div>
        ${pendingServices.map(item=>`
          <div class="visit-item">
            <span class="dot ${item.type}"></span>
            <div class="visit-item-info"><div class="visit-item-name">${LABELS[item.type]}</div><div class="visit-item-commission">Hoa hồng ${Math.round(RATES[item.type]*100)}% · ${fmtVND(item.amount*RATES[item.type])}</div></div>
            <div class="visit-item-amount">${fmtVND(item.amount)}</div>
            <button class="visit-item-remove" aria-label="Bỏ dịch vụ" onclick="removePendingService('${item.draftId}')">×</button>
          </div>`).join('')}
        <div class="visit-total">
          <div class="visit-total-cell"><div class="visit-total-label">Tổng doanh thu lượt</div><div class="visit-total-value">${fmtVND(visitRevenue)}</div></div>
          <div class="visit-total-cell"><div class="visit-total-label">Tổng hoa hồng</div><div class="visit-total-value">${fmtVND(visitCommission)}</div></div>
        </div>
      </div>` : ''}

    <div class="summary">
      <div class="box"><div class="k">Doanh thu ngày</div><div class="v tnum">${fmtVND(agg.revenue)}</div></div>
      <div class="box hi"><div class="k">Hoa hồng ngày</div><div class="v tnum">${fmtVND(agg.commission)}</div></div>
    </div>

    <div class="listtitle">Danh sách hôm nay (${visits.length} lượt · ${list.length} dịch vụ)</div>
    ${visits.length===0 ? `
      <div class="empty"><div class="ic">🗒️</div>Chưa có đơn nào trong ngày này.<br>Nhập số tiền phía trên để bắt đầu.</div>
    ` : visits.map(visit=>{
      const visitRevenue=visit.entries.reduce((sum,e)=>sum+e.amount,0);
      const visitCommission=visit.entries.reduce((sum,e)=>sum+e.amount*RATES[e.type],0);
      const first=visit.entries[0];
      return `<div class="visit-entry">
        <div class="visit-entry-head">
          <div class="visit-entry-customer">
            <div class="visit-entry-name">${first.customerName ? escapeHtml(first.customerName) : 'Khách lẻ'}</div>
            <div class="visit-entry-code">${first.customerCode ? 'MSKH: '+escapeHtml(first.customerCode)+' · ' : ''}${visit.entries.length} dịch vụ</div>
          </div>
          <div class="visit-entry-total"><div class="amount">${fmtVND(visitRevenue)}</div><div class="commission">+ ${fmtVND(visitCommission)} hoa hồng</div></div>
          <button class="visit-entry-delete" aria-label="Xóa lượt khách" onclick="deleteVisit('${keyOf(entryDate)}','${visit.visitId}')">×</button>
        </div>
        ${visit.entries.map(e=>`<div class="visit-service-row">
          <span class="dot ${e.type}"></span>
          <div class="visit-service-info"><div class="visit-service-name">${LABELS[e.type]}</div><div class="visit-service-com">Hoa hồng ${Math.round(RATES[e.type]*100)}% · ${fmtVND(e.amount*RATES[e.type])}</div></div>
          <div class="visit-service-amount">${fmtVND(e.amount)}</div>
          <button class="edit" aria-label="Sửa dịch vụ" onclick="editEntry('${keyOf(entryDate)}','${e.id}')">✎</button>
        </div>`).join('')}
      </div>`;
    }).join('')}
  `;
}

function renderStatsTab(){
  let dates, label, sublabel;
  if(statsMode==='day'){
    dates=[statsAnchor];
    label = sameDay(statsAnchor,new Date()) ? 'Hôm nay' : fmtDate(statsAnchor);
    sublabel = WD[statsAnchor.getDay()]+' · '+fmtDate(statsAnchor);
  } else if(statsMode==='week'){
    const {start,end}=weekRange(statsAnchor);
    dates=datesBetween(start,end);
    label = 'Tuần '+fmtDate(start)+' – '+fmtDate(end);
    sublabel = 'Thứ 2 → Chủ nhật';
  } else {
    const {start,end}=monthRange(statsAnchor);
    dates=datesBetween(start,end);
    label = 'Tháng '+pad(statsAnchor.getMonth()+1)+'/'+statsAnchor.getFullYear();
    sublabel = dates.length+' ngày trong tháng';
  }
  const agg = aggregate(dates);
  const total = agg.commission || 1;
  const tiemPct = agg.tiem.commission/total;
  const mayPct = agg.may.commission/total;

  // donut geometry
  const r=42, c=2*Math.PI*r;
  const tiemLen = agg.commission>0 ? tiemPct*c : 0;
  const mayLen = agg.commission>0 ? mayPct*c : 0;

  return `
    <div class="segmented">
      <button class="${statsMode==='day'?'active':''}" onclick="setStatsMode('day')">Ngày</button>
      <button class="${statsMode==='week'?'active':''}" onclick="setStatsMode('week')">Tuần</button>
      <button class="${statsMode==='month'?'active':''}" onclick="setStatsMode('month')">Tháng</button>
    </div>

    <div class="periodbar">
      <button onclick="shiftStats(-1)">‹</button>
      <div class="plabel">${label}<span class="sm">${sublabel}</span>${statsMode==='day' ? `<input type="date" aria-label="Chọn ngày thống kê" value="${keyOf(statsAnchor)}" onchange="jumpStatsDate(this.value)">` : ''}</div>
      <button onclick="shiftStats(1)">›</button>
    </div>

    <div class="summary">
      <div class="box"><div class="k">Tổng doanh thu</div><div class="v tnum">${fmtVND(agg.revenue)}</div></div>
      <div class="box hi"><div class="k">Tổng hoa hồng</div><div class="v tnum">${fmtVND(agg.commission)}</div></div>
    </div>

    <div class="donutwrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="#F1E7E1" stroke-width="12"/>
        ${agg.commission>0 ? `
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--tiem)" stroke-width="12"
          stroke-dasharray="${tiemLen} ${c-tiemLen}" stroke-dashoffset="0" transform="rotate(-90 50 50)" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--may)" stroke-width="12"
          stroke-dasharray="${mayLen} ${c-mayLen}" stroke-dashoffset="${-tiemLen}" transform="rotate(-90 50 50)" stroke-linecap="round"/>
        ` : ''}
        <text x="50" y="47" text-anchor="middle" class="display" font-size="11" fill="var(--ink)" font-weight="600">${agg.count}</text>
        <text x="50" y="60" text-anchor="middle" font-size="7.5" fill="var(--ink-soft)">đơn</text>
      </svg>
      <div class="legend">
        <div class="row">
          <span class="sw tiem"></span>
          <div class="txt"><div class="n">Tiêm — ${agg.tiem.count} đơn</div><div class="v tnum">${fmtVND(agg.tiem.commission)}</div></div>
        </div>
        <div class="row">
          <span class="sw may"></span>
          <div class="txt"><div class="n">Bắn máy — ${agg.may.count} đơn</div><div class="v tnum">${fmtVND(agg.may.commission)}</div></div>
        </div>
      </div>
    </div>

    <div class="breakdown">
      <div class="bd-row clickable" role="button" tabindex="0" onclick="openStatsDetail('tiem')">
        <div class="hd"><span class="dot tiem" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--tiem);margin-right:6px;"></span><span class="name">Dịch vụ tiêm</span><span class="rate">6%</span></div>
        <div class="stats">
          <div class="c"><div class="k">Doanh thu</div><div class="v tnum">${fmtVND(agg.tiem.revenue)}</div></div>
          <div class="c"><div class="k">Hoa hồng</div><div class="v tnum">${fmtVND(agg.tiem.commission)}</div></div>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="bd-row clickable" role="button" tabindex="0" onclick="openStatsDetail('may')">
        <div class="hd"><span class="dot may" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--may);margin-right:6px;"></span><span class="name">Dịch vụ bắn máy</span><span class="rate">8%</span></div>
        <div class="stats">
          <div class="c"><div class="k">Doanh thu</div><div class="v tnum">${fmtVND(agg.may.revenue)}</div></div>
          <div class="c"><div class="k">Hoa hồng</div><div class="v tnum">${fmtVND(agg.may.commission)}</div></div>
        </div>
        <span class="chevron">›</span>
      </div>
    </div>
  `;
}

function statsPeriodContext(){
  if(statsMode==='day'){
    return {dates:[statsAnchor],label:sameDay(statsAnchor,new Date())?'Hôm nay':fmtDate(statsAnchor),sub:WD[statsAnchor.getDay()]+' · '+fmtDate(statsAnchor)};
  }
  if(statsMode==='week'){
    const {start,end}=weekRange(statsAnchor);
    return {dates:datesBetween(start,end),label:'Tuần '+fmtDate(start)+' – '+fmtDate(end),sub:'Thứ 2 → Chủ nhật'};
  }
  const {start,end}=monthRange(statsAnchor);
  const dates=datesBetween(start,end);
  return {dates,label:'Tháng '+pad(statsAnchor.getMonth()+1)+'/'+statsAnchor.getFullYear(),sub:dates.length+' ngày trong tháng'};
}

function openStatsDetail(type){ statsDetailType=type; render(); window.scrollTo(0,0); }
function closeStatsDetail(){ statsDetailType=null; render(); window.scrollTo(0,0); }

function renderStatsDetail(){
  const context=statsPeriodContext();
  const type=statsDetailType;
  const items=[];
  context.dates.forEach(date=>{
    const dateKey=keyOf(date);
    (store[dateKey]||[]).filter(entry=>entry.type===type).forEach(entry=>items.push({...entry,dateKey,date:new Date(date)}));
  });
  items.sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||(b.ts||0)-(a.ts||0));
  const revenue=items.reduce((sum,item)=>sum+item.amount,0);
  const commission=items.reduce((sum,item)=>sum+item.amount*RATES[type],0);
  const grouped={};
  items.forEach(item=>{ if(!grouped[item.dateKey]) grouped[item.dateKey]=[]; grouped[item.dateKey].push(item); });
  const dateKeys=Object.keys(grouped).sort().reverse();
  return `
    <div class="detail-top">
      <button class="detail-back" onclick="closeStatsDetail()" aria-label="Quay lại">‹</button>
      <div class="detail-heading"><div class="detail-title">${LABELS[type]}</div><div class="detail-period">${context.label} · ${items.length} dịch vụ</div></div>
    </div>
    <div class="summary">
      <div class="box"><div class="k">Tổng doanh thu</div><div class="v tnum">${fmtVND(revenue)}</div></div>
      <div class="box hi"><div class="k">Tổng hoa hồng</div><div class="v tnum">${fmtVND(commission)}</div></div>
    </div>
    ${items.length===0 ? `<div class="empty"><div class="ic">🗒️</div>Không có dịch vụ nào trong khoảng thời gian này.</div>` : dateKeys.map(dateKey=>{
      const [year,month,day]=dateKey.split('-').map(Number);
      const date=new Date(year,month-1,day);
      return `<div class="detail-day-title">${WD[date.getDay()]} · ${fmtDate(date)} (${grouped[dateKey].length})</div>
      ${grouped[dateKey].map(entry=>`<div class="detail-entry">
        <span class="dot ${type}"></span>
        <div class="detail-entry-info"><div class="detail-entry-name">${entry.customerName ? escapeHtml(entry.customerName) : 'Khách lẻ'}</div><div class="detail-entry-code">${entry.customerCode ? 'MSKH: '+escapeHtml(entry.customerCode) : LABELS[type]}</div></div>
        <div class="detail-entry-money"><div class="detail-entry-amount">${fmtVND(entry.amount)}</div><div class="detail-entry-com">+ ${fmtVND(entry.amount*RATES[type])}</div></div>
      </div>`).join('')}`;
    }).join('')}
  `;
}

function attachEntryTabEvents(){}

/* ================= Actions ================= */
function shiftEntryDate(n){ entryDate = addDays(entryDate, n); render(); }
function jumpEntryDate(v){ if(v){ const [y,m,d]=v.split('-').map(Number); entryDate=new Date(y,m-1,d); render(); } }

function setStatsMode(m){ statsMode=m; render(); }
function shiftStats(n){
  if(statsMode==='day') statsAnchor = addDays(statsAnchor, n);
  else if(statsMode==='week') statsAnchor = addDays(statsAnchor, n*7);
  else statsAnchor = addMonths(statsAnchor, n);
  render();
}
function jumpStatsDate(value){
  if(!value) return;
  const [year,month,day]=value.split('-').map(Number);
  statsAnchor=new Date(year,month-1,day);
  render();
}

function selectType(t){ pendingType=t; render(); }

function updateAmountEntryUI(){
  const amount=pendingDigits ? parseInt(pendingDigits,10) : 0;
  const valueEl=document.querySelector('.amount-display .val');
  const commissionEl=document.querySelector('.amount-display .commission');
  const queueButton=document.querySelector('.queue-btn');
  const saveButton=document.querySelector('.save-now-btn');
  if(valueEl){
    valueEl.textContent=amount>0 ? fmtVND(amount) : '0 đ';
    valueEl.classList.toggle('placeholder',amount<=0);
  }
  if(commissionEl) commissionEl.innerHTML=amount>0 ? 'Hoa hồng dự kiến: '+fmtVND(amount*RATES[pendingType]) : '&nbsp;';
  if(queueButton) queueButton.disabled=amount<=0;
  if(saveButton) saveButton.disabled=amount<=0 && pendingServices.length===0;
}

function numTap(v){
  if(pendingDigits==='' && v==='0') return;
  if(pendingDigits.length>=12) return;
  pendingDigits += v;
  pendingDigits = pendingDigits.replace(/^0+(?=\d)/,'');
  updateAmountEntryUI();
}
function numBack(){
  pendingDigits = pendingDigits.slice(0,-1);
  updateAmountEntryUI();
}

async function addEntryLegacy(){
  const amount = parseInt(pendingDigits||'0',10);
  if(amount<=0) return;
  const key = keyOf(entryDate);
  if(!store[key]) store[key]=[];
  const entry = {
    id: 'e'+Date.now()+Math.random().toString(36).slice(2,7),
    type: pendingType,
    amount,
    customerName: pendingCustomerName.trim(),
    customerCode: pendingCustomerCode.trim(),
    ts: Date.now()
  };
  store[key].push(entry);
  pendingDigits='';
  pendingCustomerName='';
  pendingCustomerCode='';
  render();
  await saveStore();
  await syncEntry(entry,key);
}

function addPendingService(){
  const amount=parseInt(pendingDigits||'0',10);
  if(amount<=0) return;
  pendingServices.push({
    draftId:'d'+Date.now()+Math.random().toString(36).slice(2,6),
    type:pendingType,
    amount
  });
  pendingDigits='';
  render();
}

function removePendingService(draftId){
  pendingServices=pendingServices.filter(item=>item.draftId!==draftId);
  render();
}

async function saveVisit(){
  const currentAmount=parseInt(pendingDigits||'0',10);
  const services=pendingServices.slice();
  if(currentAmount>0) services.push({type:pendingType,amount:currentAmount});
  if(!services.length) return;
  const key=keyOf(entryDate);
  if(!store[key]) store[key]=[];
  const timestamp=Date.now();
  const visitId='v'+timestamp+'_'+Math.random().toString(36).slice(2,8);
  const customerName=pendingCustomerName.trim();
  const customerCode=pendingCustomerCode.trim();
  const entries=services.map((service,index)=>({
    id:visitId+'_'+index,
    visitId,
    type:service.type,
    amount:service.amount,
    customerName,
    customerCode,
    ts:timestamp+index
  }));
  store[key].push(...entries);
  const count=entries.length;
  pendingServices=[];
  pendingDigits='';
  pendingCustomerName='';
  pendingCustomerCode='';
  render();
  await saveStore();
  await Promise.all(entries.map(entry=>syncEntry(entry,key)));
  showToast('Đã lưu '+count+' dịch vụ');
}

async function editEntryLegacy(key, id){
  const entry = (store[key]||[]).find(e=>e.id===id);
  if(!entry) return;
  const amountText = prompt('Số tiền dịch vụ:', String(entry.amount));
  if(amountText===null) return;
  const amount = Number(amountText.replace(/[^0-9]/g,''));
  if(!Number.isFinite(amount) || amount<=0){
    alert('Số tiền không hợp lệ. Vui lòng nhập số lớn hơn 0.');
    return;
  }
  const name = prompt('Tên khách hàng (có thể để trống):', entry.customerName || '');
  if(name===null) return;
  const code = prompt('MSKH (có thể để trống):', entry.customerCode || '');
  if(code===null) return;
  entry.amount = amount;
  entry.customerName = name.trim();
  entry.customerCode = code.trim();
  render();
  await saveStore();
  await syncEntry(entry,key);
  showToast('Đã cập nhật thông tin KH');
}

async function deleteEntryLegacy(key, id){
  const arr = store[key]||[];
  const idx = arr.findIndex(e=>e.id===id);
  if(idx===-1) return;
  const entry = arr[idx];
  const customer = entry.customerName ? '\nKhách hàng: '+entry.customerName : '';
  if(!confirm('Bạn có chắc muốn xóa đơn '+fmtVND(entry.amount)+'?'+customer)) return;
  lastDeleted = { key, entry: arr[idx] };
  arr.splice(idx,1);
  render();
  await saveStore();
  await removeRemoteEntry(id);
  showToast('Đã xóa đơn');
}

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function backdropClose(event,id){ if(event.target===event.currentTarget) closeModal(id); }

function editEntry(key,id){
  const entry=(store[key]||[]).find(item=>item.id===id);
  if(!entry) return;
  editContext={key,id};
  document.getElementById('edit-amount').value=String(entry.amount);
  document.getElementById('edit-name').value=entry.customerName||'';
  document.getElementById('edit-code').value=entry.customerCode||'';
  document.getElementById('edit-error').textContent='';
  openModal('edit-modal');
  setTimeout(()=>document.getElementById('edit-amount').focus(),220);
}

async function saveEditEntry(){
  if(!editContext) return;
  const {key,id}=editContext;
  const entry=(store[key]||[]).find(item=>item.id===id);
  if(!entry) return closeModal('edit-modal');
  const amount=Number(document.getElementById('edit-amount').value.replace(/[^0-9]/g,''));
  if(!Number.isFinite(amount)||amount<=0){
    document.getElementById('edit-error').textContent='Vui lòng nhập số tiền lớn hơn 0.';
    return;
  }
  entry.amount=amount;
  const customerName=document.getElementById('edit-name').value.trim();
  const customerCode=document.getElementById('edit-code').value.trim();
  const visitId=visitKeyOf(entry);
  const visitEntries=(store[key]||[]).filter(item=>visitKeyOf(item)===visitId);
  visitEntries.forEach(item=>{ item.customerName=customerName; item.customerCode=customerCode; });
  editContext=null;
  closeModal('edit-modal');
  render(); await saveStore(); await Promise.all(visitEntries.map(item=>syncEntry(item,key)));
  showToast('Đã cập nhật đơn');
}

function deleteEntry(key,id){
  const entry=(store[key]||[]).find(item=>item.id===id);
  if(!entry) return;
  deleteVisit(key,visitKeyOf(entry));
}

function deleteVisit(key,visitId){
  const entries=(store[key]||[]).filter(item=>visitKeyOf(item)===visitId);
  if(!entries.length) return;
  deleteContext={key,ids:entries.map(item=>item.id)};
  const amount=entries.reduce((sum,item)=>sum+item.amount,0);
  document.getElementById('delete-amount').textContent=fmtVND(amount);
  document.getElementById('delete-customer').textContent=(entries[0].customerName ? 'Khách hàng: '+entries[0].customerName+' · ' : '')+entries.length+' dịch vụ';
  openModal('delete-modal');
}

async function confirmDeleteEntry(){
  if(!deleteContext) return;
  const {key,ids}=deleteContext;
  const arr=store[key]||[];
  const entries=arr.filter(item=>ids.includes(item.id));
  if(!entries.length) return closeModal('delete-modal');
  lastDeleted={key,entries};
  store[key]=arr.filter(item=>!ids.includes(item.id));
  deleteContext=null;
  closeModal('delete-modal');
  render(); await saveStore(); await Promise.all(ids.map(id=>removeRemoteEntry(id)));
  showToast('Đã xóa lượt khách');
}

async function undoDelete(){
  if(!lastDeleted) return;
  const {key} = lastDeleted;
  const entries=lastDeleted.entries || [lastDeleted.entry];
  if(!store[key]) store[key]=[];
  store[key].push(...entries);
  lastDeleted=null;
  hideToast();
  render();
  await saveStore();
  await Promise.all(entries.map(entry=>syncEntry(entry,key)));
}

function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 4000);
}
function hideToast(){
  document.getElementById('toast').classList.remove('show');
}
document.getElementById('toast-undo').onclick = undoDelete;

/* ================= Init ================= */
(async function init(){
  const {data,error}=await dbClient.auth.getSession();
  if(error) console.error(error);
  if(data && data.session && data.session.user) await startApp(data.session.user);
})();
</script>
